<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="dashboard-section" class="container">
    <header>
        <h2>My finances</h2>
        <button id="logout-btn" class="btn-secondary">Log out</button>
    </header>

    <div class="dashboard-grid">
        <div class="panel">
            <h3>Categories</h3>
            <form id="category-form">
                <input type="text" id="category-name" placeholder="New category" required>
                <button type="submit">Add category</button>
            </form>
            <ul id="categories-list"></ul>
        </div>

        <div class="panel">
            <h3>Transactions</h3>
            <form id="transaction-form">
                <input type="number" id="amount" placeholder="Amount" required step="0.01">
                <input type="date" id="date" required>
                <select id="category-select" required>
                    <option value="" disabled selected>Select a category...</option>
                </select>
                <input type="text" id="comment" placeholder="Comment">
                <button type="submit">Add expense</button>
            </form>
            <ul id="transactions-list"></ul>
        </div>

        <div class="panel">
            <h3>Statistics</h3>

            <div class="stats-card">
                <div class="stats-header-row">
                    <h4>Monthly Total</h4>
                    <input type="month" id="stats-month-picker" class="stats-month-picker">
                </div>

                <div id="monthly-total" class="stats-total">0.00 ₴</div>
            </div>

            <div class="stats-card mt-15">
                <h4>By Category</h4>
                <ul id="stats-categories-list" class="stats-list"></ul>
            </div>
        </div>
    </div>

    <p id="main-error" class="error-text"></p>
</div>

<script type="module" src="./js/main.js"></script>

</body>
</html>
